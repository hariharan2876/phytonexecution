name: Chained Workflow Example

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (UTC)
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run first script
        run: python phytonnew/assignments.py

  second-job:
    runs-on: ubuntu-latest
    needs: first-job   # ✅ only runs if first-job succeeds
    steps:
      - uses: actions/checkout@v4
      - name: Run second script
        run: python phytonnew/dictionary.py
